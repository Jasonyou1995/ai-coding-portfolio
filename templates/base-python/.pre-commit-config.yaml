# Pre-commit hooks configuration
# Install: pre-commit install
# Run: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: forbid-submodules

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11

  # Python linting
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  # Local hooks for custom checks
  - repo: local
    hooks:
      - id: check-env-files
        name: Check for .env files
        entry: bash -c 'if git diff --cached --name-only | grep -E "\.env$|\.env\.local$" | grep -v ".env.example"; then echo "❌ Error: .env files should not be committed!"; exit 1; fi'
        language: system
        pass_filenames: false
      
      - id: check-api-keys
        name: Check for hardcoded API keys
        entry: bash -c '
          if grep -r "sk-[a-zA-Z0-9]{20,}" --include="*.py" . 2>/dev/null | grep -v ".env.example"; then
            echo "❌ Potential OpenAI API key found!";
            exit 1;
          fi
        '
        language: system
        pass_filenames: false
